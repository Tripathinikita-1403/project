    <title>Renova – Advanced Home Renovation Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'eco-green-light': '#E0F2F1',
            'eco-green': '#A5D6A7',
            'eco-green-dark': '#4CAF50',
            'sky-blue-light': '#E1F5FE',
            'sky-blue': '#81D4FA',
            'sky-blue-dark': '#29B6F6',
            'eco-brown': '#D7CCC8',
            'eco-grey': '#F5F5F5',
          },
          animation: {
            'fade-in': 'fadeIn 1s ease-in-out',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            float: {
              '0%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
              '100%': { transform: 'translateY(0px)' },
            },
          }
        }
      }
    }
    </script>
